name: CI

# Build + test gate for pull requests targeting develop.
on:
  pull_request:
    branches: [develop]

# Cancel superseded runs on the same PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r --if-present lint

      - name: Typecheck
        run: pnpm -r --if-present typecheck

      - name: Test
        run: pnpm -r --if-present test

      - name: Build
        run: pnpm -r --if-present build
        # Placeholder env so module-level client construction (db/redis/stellar)
        # succeeds during `next build`. No connections happen at build time; the
        # real values come from the host at runtime. ISSUER_SECRET is a throwaway
        # testnet key (no funds) needed only because stellar.ts parses it at import.
        env:
          APP_URL: http://localhost:3000
          AUTH_URL: http://localhost:3000
          AUTH_SECRET: build-time-placeholder-secret-0123456789
          DATABASE_URL: postgresql://u:p@localhost:5432/db
          DIRECT_URL: postgresql://u:p@localhost:5432/db
          REDIS_URL: redis://localhost:6379
          S3_ENDPOINT: http://localhost:9000
          S3_REGION: us-east-1
          S3_BUCKET: zelyo
          S3_ACCESS_KEY_ID: build
          S3_SECRET_ACCESS_KEY: build
          STELLAR_NETWORK: testnet
          NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          HORIZON_URL: https://horizon-testnet.stellar.org
          ISSUER_SECRET: SA3OP4XXQVCPNGQIXCY7N52XFSWLZ6NZIGBNIMO36YFULAMSZFTQPKFY
          ISSUER_STELLAR_ACCOUNT: GA7S72OIV2JE47JSSAIGMIJAN4BLTHQZIYPFFXYKZRLVQX7QGISWQZA4
          CREDENTIAL_REGISTRY_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          ZK_SCOPE_APP_ID: zelyo-v1
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: build-placeholder
          ISSUER_NAME: Institute of Distributed Systems

      # pnpm audit is dead upstream: npm retired the legacy audit endpoints it calls
      # (410 Gone, every pnpm version incl. 12-alpha). dependency-review-action would
      # be the usual replacement, but this repo is private and that action requires
      # GitHub Advanced Security. OSV-Scanner reads pnpm-lock.yaml directly, needs no
      # GH features, and works on private repos. It exits 1 on ANY vulnerability, so
      # we gate on CRITICAL ourselves via the JSON report (GHSA severity field).
      - name: Audit (fail on critical)
        run: |
          curl -sSfL https://github.com/google/osv-scanner/releases/download/v2.4.0/osv-scanner_linux_amd64 -o "$RUNNER_TEMP/osv-scanner"
          chmod +x "$RUNNER_TEMP/osv-scanner"
          "$RUNNER_TEMP/osv-scanner" scan source --lockfile=pnpm-lock.yaml --format json > osv.json || true
          total=$(jq '[.results[].packages[].vulnerabilities[]] | length' osv.json)
          critical=$(jq '[.results[].packages[].vulnerabilities[] | select(((.database_specific.severity // "") | ascii_upcase) == "CRITICAL")] | length' osv.json)
          echo "OSV scan: $total known vulnerabilities, $critical critical (gate fails on critical only)"
          if [ "$critical" -gt 0 ]; then
            jq -r '.results[].packages[] | .package.name as $n | .vulnerabilities[] | select(((.database_specific.severity // "") | ascii_upcase) == "CRITICAL") | "CRITICAL: \($n) — \(.id)"' osv.json
            exit 1
          fi
